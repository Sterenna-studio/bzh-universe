name: Sync to gwen-ha-star-static

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in gwen-ha-star-static
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        if: ${{ env.TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: sterenna-studio/gwen-ha-star-static
          event-type: sync-bzh-universe
