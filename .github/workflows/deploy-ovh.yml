name: Deploy BZH Universe

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-bzh-universe-ovh
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy BZH Universe to Nitro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate static entrypoints
        run: |
          test -f index.html
          test -f hub/index.html
          test -f hub/styles.css
          test -f hub/contributions/index.html
          test -f hub/contributions/contributions.js
          test -f docs/00-index.html
          echo "BZH Universe static entrypoints OK"

      - name: Add deployment marker
        run: |
          echo "BZH Universe deploy" > deploy-test.txt
          echo "Commit: $GITHUB_SHA" >> deploy-test.txt
          echo "Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> deploy-test.txt

      - name: Deploy to Nitro
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.OVH_HOST }}
          REMOTE_USER: ${{ secrets.OVH_USER }}
          SOURCE: ./
          TARGET: ~/nitro/bzh-universe/
          ARGS: -avz --delete
          EXCLUDE: .git/,.github/,.env,.env.*
